name: Claude Code Review

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      github.actor == 'brandonwie' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude review')
    timeout-minutes: 15
    runs-on: ubuntu-latest
    environment: claude-${{ github.actor }}
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Validate Claude token
        env:
          CLAUDE_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          if [ -z "$CLAUDE_TOKEN" ]; then
            echo "::error::No CLAUDE_CODE_OAUTH_TOKEN found for environment claude-${GH_ACTOR}. See .github/CLAUDE_SETUP.md for setup instructions."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          additional_permissions: |
            actions: read
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}

            Please review this pull request.

            ## Project Context

            codex-hud is an open-source Codex plugin plus patched TUI launcher.
            It is intentionally small and script-heavy: CommonJS Node scripts,
            a vendored TOML parser, a Codex plugin manifest, README/i18n docs,
            and installer tooling for an optional patched Codex footer.

            The key user-visible surface is exact terminal output for the HUD
            footer/status line. Byte-level changes to ANSI colors, separators,
            labels, segment order, token/rate formatting, or config merge
            semantics are product changes and must be reviewed carefully.

            ## Review Categories

            1. Correctness - HUD output, config precedence, TOML validation, null-safe rendering
            2. Parity Safety - golden fixtures, deterministic clocks, exact ANSI/text output
            3. Installer Safety - no writes to stock Codex paths, safe shims, rollback behavior
            4. Plugin Packaging - manifest validity, marketplace paths, zero unnecessary runtime deps
            5. Security - workflow permissions, shell injection, unsafe path handling, secret exposure
            6. Maintainability - small CommonJS style, focused helpers, low abstraction overhead
            7. Documentation - README/i18n accuracy for install, rollback, updates, and limitations

            ## Project Conventions (Do NOT Flag)

            - CommonJS scripts are intentional; do not request ESM/TypeScript rewrites.
            - The vendored TOML parser is intentional to keep runtime installs dependency-light.
            - Golden fixtures may show escaped ANSI as `\x1b` text for readable diffs.
            - The patched Codex footer path is optional/advanced and upstream-coupled.
            - Preserve `exec -a codex` in generated launchers so Herdr recognizes the process.
            - Do not suggest modifying `/opt/homebrew/bin/codex` or stock Codex install paths.
            - Prefer focused tests in `scripts/test-codex-hud.js`,
              `scripts/test-codex-hud-config.js`, `scripts/test-golden.js`, or
              `scripts/test-patched-codex-installer.js`.

            ## Output Instructions

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues.
            Only post GitHub comments - do not submit review text as messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*)"
