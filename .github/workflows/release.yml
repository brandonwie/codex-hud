name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Pinned from refs/tags/v6 on 2026-06-11.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Setup Node.js
        # Pinned from refs/tags/v4 on 2026-06-11.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        # Pinned from refs/heads/stable on 2026-06-10.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Format (Rust)
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check

      - name: Lint (Rust)
        run: cargo clippy --manifest-path rust/Cargo.toml -- -D warnings

      - name: Test
        run: npm test

      - name: Test (Rust)
        run: npm run test:rust

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: verify
    if: github.repository == 'brandonwie/codex-hud'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      GIT_AUTHOR_NAME: github-actions[bot]
      GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      GIT_COMMITTER_NAME: github-actions[bot]
      GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
    steps:
      - name: Checkout
        # Pinned from refs/tags/v6 on 2026-06-11.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Setup Node.js
        # Pinned from refs/tags/v4 on 2026-06-11.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
