name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        # Pinned from refs/heads/stable on 2026-06-10.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Format (Rust)
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check

      - name: Lint (Rust)
        run: cargo clippy --manifest-path rust/Cargo.toml -- -D warnings

      - name: Test
        run: npm test

      - name: Test (Rust)
        run: npm run test:rust
